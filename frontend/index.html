<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyEarn - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex; align-items:center; min-height:100vh; padding-bottom:0; background:var(--primary)">
    
    <div class="container" style="width:100%">
        <h1 class="text-center" style="color:white; margin-bottom: 24px;">DailyEarn</h1>
        
        <div class="card">
            <div class="tabs">
                <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                <div class="tab" id="tab-register" onclick="switchTab('register')">Register</div>
            </div>
            
            <!-- Login Form -->
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn">Login Securely</button>
            </form>
            
            <!-- Register Section -->
            <div id="register-container" style="display: none;">
                <!-- Initial Pay Button -->
                <div id="pay-section">
                    <p style="text-align:center; color:#ccc; margin-bottom: 20px; font-size: 14px;">Pay a one-time fee of ₹10 to register.</p>
                    <button id="btn-pay-initial" class="btn btn-green">Pay 10Rs One Time</button>
                </div>
                
                <!-- Register Form (hidden until paid) -->
                <form id="register-form" style="display: none;">
                    <input type="text" id="reg-name" placeholder="Full Name" required>
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit" class="btn btn-green">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
