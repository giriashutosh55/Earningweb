<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyEarn - Withdraw</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header" style="background:var(--green)">
        <h2>Withdraw Earnings</h2>
    </div>

    <div class="container" style="margin-top: 16px;">
        
        <!-- Balance Card -->
        <div class="card text-center text-muted">
            <p>Current Balance</p>
            <h2 class="text-primary mt-1"><span id="total-coins">0</span> Coins</h2>
            <p class="text-muted text-sm">(₹<span id="total-inr">0.00</span> INR)</p>
        </div>

        <!-- Withdrawal Form -->
        <div class="card">
            <h4>Request Withdrawal</h4>
            <p class="text-muted mt-1 mb-2">Minimum ₹15 (1500 coins) required</p>

            <form id="withdraw-form">
                <input type="text" id="upi-id" placeholder="Enter UPI ID (e.g. name@okhdfcbank)" required>
                
                <input type="number" id="withdraw-coins" placeholder="Coins to withdraw (Min: 1500)" min="1500" required>
                
                <p class="text-muted mb-2">You will receive: <strong style="color:var(--green)">₹<span id="receive-amount">0.00</span></strong></p>
                
                <button type="submit" id="submit-btn" class="btn btn-green">Request Withdrawal</button>
            </form>
        </div>

        <h3>Withdrawal History</h3>
        
        <div class="card" id="history-list" style="padding: 0; background: transparent; box-shadow: none;">
            <!-- Render via JS -->
            <p class="text-center text-muted mt-2">No history.</p>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div id="bottom-nav" class="bottom-nav"></div>

    <script src="js/api.js"></script>
    <script src="js/withdraw.js"></script>
</body>
</html>
